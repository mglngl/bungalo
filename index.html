document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0 0);\n\n  --muted: oklch(0.269 0 0);\n  --muted-foreground: oklch(0.708 0 0);\n  --accent: oklch(0.371 0 0);\n  --accent-foreground: oklch(0.985 0 0);\n\n  --destructive: oklch(0.704 0.191 22.216);\n  --destructive-foreground: oklch(0.58 0.22 27);\n\n  --border: oklch(1 0 0 / 10%);\n  --input: oklch(1 0 0 / 15%);\n  --ring: oklch(0.556 0 0);\n\n  --surface: oklch(0.2 0 0);\n  --surface-foreground: oklch(0.708 0 0);\n  --selection: oklch(0.922 0 0);\n  --selection-foreground: oklch(0.205 0 0);\n\n  --sidebar: oklch(0.205 0 0);\n  --sidebar-foreground: oklch(0.985 0 0);\n  --sidebar-primary: oklch(0.488 0.243 264.376);\n  --sidebar-primary-foreground: oklch(0.985 0 0);\n  --sidebar-accent: oklch(0.269 0 0);\n  --sidebar-accent-foreground: oklch(0.985 0 0);\n  --sidebar-border: oklch(1 0 0 / 10%);\n  --sidebar-ring: oklch(0.439 0 0);\n}\n<\u002Fstyle>\n  <style>/* ------------------------------------------------------------------\n   TYPOGRAPHY — font families, sizes, weights, line-heights, tracking.\n   shadcn/ui uses a single sans family (Geist) for body + headings,\n   and Geist Mono for code. Tailwind's default type scale.\n   ------------------------------------------------------------------ */\n\n:root {\n  /* Families */\n  --font-sans: \"Geist\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n  --font-heading: \"Geist\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", monospace;\n\n  /* Font sizes (Tailwind scale) — size / line-height */\n  --text-xs: 0.75rem;    --text-xs--line-height: 1rem;      /* 12 / 16 */\n  --text-sm: 0.875rem;   --text-sm--line-height: 1.25rem;   /* 14 / 20 */\n  --text-base: 1rem;     --text-base--line-height: 1.5rem;  /* 16 / 24 */\n  --text-lg: 1.125rem;   --text-lg--line-height: 1.75rem;   /* 18 / 28 */\n  --text-xl: 1.25rem;    --text-xl--line-height: 1.75rem;   /* 20 / 28 */\n  --text-2xl: 1.5rem;    --text-2xl--line-height: 2rem;     /* 24 / 32 */\n  --text-3xl: 1.875rem;  --text-3xl--line-height: 2.25rem;  /* 30 / 36 */\n  --text-4xl: 2.25rem;   --text-4xl--line-height: 2.5rem;   /* 36 / 40 */\n  --text-5xl: 3rem;      --text-5xl--line-height: 1;         /* 48 */\n  --text-6xl: 3.75rem;   --text-6xl--line-height: 1;         /* 60 */\n\n  /* Weights */\n  --font-weight-normal: 400;\n  --font-weight-medium: 500;\n  --font-weight-semibold: 600;\n  --font-weight-bold: 700;\n\n  /* Letter-spacing */\n  --tracking-tighter: -0.05em;\n  --tracking-tight: -0.025em;\n  --tracking-normal: 0em;\n  --tracking-wide: 0.025em;\n  --tracking-widest: 0.1em;\n\n  /* Line-height keywords */\n  --leading-none: 1;\n  --leading-tight: 1.25;\n  --leading-snug: 1.375;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.625;\n}\n<\u002Fstyle>\n  <style>/* ------------------------------------------------------------------\n   SPACING — Tailwind's 4px-base spacing scale (--spacing = 0.25rem).\n   Every step is a multiple of the base unit. Used for padding,\n   margin, and gap throughout the system.\n   ------------------------------------------------------------------ */\n\n:root {\n  --spacing: 0.25rem;   /* 4px base unit */\n\n  --space-0: 0;\n  --space-0-5: calc(var(--spacing) * 0.5);  /* 2px  */\n  --space-1: calc(var(--spacing) * 1);      /* 4px  */\n  --space-1-5: calc(var(--spacing) * 1.5);  /* 6px  */\n  --space-2: calc(var(--spacing) * 2);      /* 8px  */\n  --space-2-5: calc(var(--spacing) * 2.5);  /* 10px */\n  --space-3: calc(var(--spacing) * 3);      /* 12px */\n  --space-4: calc(var(--spacing) * 4);      /* 16px */\n  --space-5: calc(var(--spacing) * 5);      /* 20px */\n  --space-6: calc(var(--spacing) * 6);      /* 24px */\n  --space-8: calc(var(--spacing) * 8);      /* 32px */\n  --space-10: calc(var(--spacing) * 10);    /* 40px */\n  --space-12: calc(var(--spacing) * 12);    /* 48px */\n  --space-16: calc(var(--spacing) * 16);    /* 64px */\n  --space-20: calc(var(--spacing) * 20);    /* 80px */\n  --space-24: calc(var(--spacing) * 24);    /* 96px */\n}\n<\u002Fstyle>\n  <style>/* ------------------------------------------------------------------\n   RADIUS — shadcn/ui derives a scale from a single --radius base.\n   base = 0.625rem (10px). sm/md/lg/xl/2xl scale off it.\n   ------------------------------------------------------------------ */\n\n:root {\n  --radius: 0.625rem;                        /* 10px — the base knob */\n  --radius-sm: calc(var(--radius) * 0.6);    /* 6px  */\n  --radius-md: calc(var(--radius) * 0.8);    /* 8px  */\n  --radius-lg: var(--radius);                /* 10px */\n  --radius-xl: calc(var(--radius) * 1.4);    /* 14px */\n  --radius-2xl: calc(var(--radius) * 1.8);   /* 18px */\n  --radius-3xl: calc(var(--radius) * 2.2);   /* 22px */\n  --radius-full: 9999px;\n}\n<\u002Fstyle>\n  <style>/* ------------------------------------------------------------------\n   SHADOWS — Tailwind's elevation scale. shadcn leans on the low end:\n   shadow-xs on inputs/buttons, shadow-sm on cards, shadow-md on\n   popovers/dropdowns, shadow-lg/xl/2xl on dialogs & overlays.\n   ------------------------------------------------------------------ */\n\n:root {\n  --shadow-2xs: 0 1px rgb(0 0 0 / 0.05);\n  --shadow-xs:  0 1px 2px 0 rgb(0 0 0 / 0.05);\n  --shadow-sm:  0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);\n  --shadow-md:  0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);\n  --shadow-lg:  0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);\n  --shadow-xl:  0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);\n  --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);\n}\n<\u002Fstyle>\n  <style>/* ------------------------------------------------------------------\n   BASE — minimal resets + body defaults so specimen cards and kits\n   inherit the brand typeface and color without extra setup.\n   ------------------------------------------------------------------ */\n\nbody {\n  font-family: var(--font-sans);\n  color: var(--foreground);\n  background: var(--background);\n  font-synthesis-weight: none;\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\n\n::selection {\n  background: var(--selection);\n  color: var(--selection-foreground);\n}\n<\u002Fstyle>\n  <style>/* ==================================================================\n   COMPONENT STYLES — shadcn/ui (new-york-v4), hand-ported to plain CSS\n   driven entirely by the design tokens. Class names are prefixed `ui-`.\n   Values (heights, paddings, radii) are copied verbatim from source.\n   ================================================================== */\n\n/* ---------- BUTTON ---------- */\n.ui-btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  gap: var(--space-2); flex-shrink: 0; white-space: nowrap;\n  border-radius: var(--radius-md); font-family: var(--font-sans);\n  font-size: var(--text-sm); line-height: var(--text-sm--line-height);\n  font-weight: var(--font-weight-medium);\n  transition: all .15s ease; outline: none; cursor: pointer;\n  border: 1px solid transparent; user-select: none;\n  height: 2.25rem; padding: 0 var(--space-4); /* h-9 px-4 */\n}\n.ui-btn > svg { width: 1rem; height: 1rem; flex-shrink: 0; pointer-events: none; }\n.ui-btn:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent); }\n.ui-btn:disabled { pointer-events: none; opacity: .5; }\n.ui-btn:active { opacity: .9; }\n\n.ui-btn[data-variant=\"default\"] { background: var(--primary); color: var(--primary-foreground); }\n.ui-btn[data-variant=\"default\"]:hover { background: color-mix(in oklab, var(--primary) 90%, transparent); }\n.ui-btn[data-variant=\"destructive\"] { background: var(--destructive); color: #fff; }\n.ui-btn[data-variant=\"destructive\"]:hover { background: color-mix(in oklab, var(--destructive) 90%, transparent); }\n.ui-btn[d s should\n   reference the SEMANTIC tokens (--primary, --border, --muted, …).\n   ------------------------------------------------------------------ */\n\n:root {\n  /* --- Neutral ramp (Tailwind \"neutral\" in OKLCH) --- */\n  --neutral-50:  oklch(0.985 0 0);\n  --neutral-100: oklch(0.97 0 0);\n  --neutral-200: oklch(0.922 0 0);\n  --neutral-300: oklch(0.87 0 0);\n  --neutral-400: oklch(0.708 0 0);\n  --neutral-500: oklch(0.556 0 0);\n  --neutral-600: oklch(0.439 0 0);\n  --neutral-700: oklch(0.371 0 0);\n  --neutral-800: oklch(0.269 0 0);\n  --neutral-900: oklch(0.205 0 0);\n  --neutral-950: oklch(0.145 0 0);\n\n  /* --- Blue ramp (data-viz / charts) --- */\n  --blue-300: oklch(0.809 0.105 251.813);\n  --blue-500: oklch(0.623 0.214 259.815);\n  --blue-600: oklch(0.546 0.245 262.881);\n  --blue-700: oklch(0.488 0.243 264.376);\n  --blue-800: oklch(0.424 0.199 265.638);\n\n  /* --- Semantic tokens (LIGHT) --- */\n  --background: oklch(1 0 0);\n  --foreground: oklch(0% 0 0);\n\n  --card: oklch(1 0 0);\n  --card-foreground: oklch(0% 0 0);\n  --popover: oklch(1 0 0);\n  --popover-foreground: oklch(0% 0 0);\n\n  --primary: oklch(0% 0 0);\n  --primary-foreground: oklch(0.985 0 0);\n  --secondary: oklch(0.97 0 0);\n  --secondary-foreground: oklch(0.205 0 0);\n\n  --muted: oklch(0.97 0 0);\n  --muted-foreground: oklch(0.556 0 0);\n  --accent: oklch(0.97 0 0);\n  --accent-foreground: oklch(0.205 0 0);\n\n  --destructive: oklch(0.577 0.245 27.325);\n  --destructive-foreground: oklch(0.97 0.01 17);\n\n  --border: oklch(0.922 0 0);\n  --input: oklch(0.922 0 0);\n  --ring: oklch(0.708 0 0);\n\n  --surface: oklch(0.98 0 0);\n  --surface-foreground: var(--foreground);\n  --selection: oklch(0% 0 0);\n  --selection-foreground: oklch(1 0 0);\n\n  /* charts */\n  --chart-1: var(--blue-300);\n  --chart-2: var(--blue-500);\n  --chart-3: var(--blue-600);\n  --chart-4: var(--blue-700);\n  --chart-5: var(--blue-800);\n\n  /* sidebar surface */\n  --sidebar: oklch(0.985 0 0);\n  --sidebar-foreground: oklch(0% 0 0);\n  --sidebar-primary: oklch(0.205 0 0);\n  --sidebar-primary-foreground: oklch(0.985 0 0);\n  --sidebar-accent: oklch(0.97 0 0);\n  --sidebar-accent-foreground: oklch(0.205 0 0);\n  --sidebar-border: oklch(0.922 0 0);\n  --sidebar-ring: oklch(0.708 0 0);\n\n  /* --color-* aliases (Tailwind @theme names, for convenience) */\n  --color-background: var(--background);\n  --color-foreground: var(--foreground);\n  --color-card: var(--card);\n  --color-primary: var(--primary);\n  --color-primary-foreground: var(--primary-foreground);\n  --color-secondary: var(--secondary);\n  --color-muted: var(--muted);\n  --color-muted-foreground: var(--muted-foreground);\n  --color-accent: var(--accent);\n  --color-destructive: var(--destructive);\n  --color-border: var(--border);\n  --color-ring: var(--ring);\n}\n\n/* --- Dark theme --- */\n.dark {\n  --background: oklch(0.145 0 0);\n  --foreground: oklch(0.985 0 0);\n  --card: oklch(0.205 0 0);\n  --card-foreground: oklch(0.985 0 0);\n  --popover: oklch(0.205 0 0);\n  --popover-foreground: oklch(0.985 0 0);\n\n  --primary: oklch(0.922 0 0);\n  --primary-foreground: oklch(0.205 0 0);\n  --secondary: oklch(0.269 0 0);\n  --secondary-foreground: oklch(0.985 0 0);\n\n  --muted: oklch(0.269 0 0);\n  --muted-foreground: oklch(0.708 0 0);\n  --accent: oklch(0.371 0 0);\n  --accent-foreground: oklch(0.985 0 0);\n\n  --destructive: oklch(0.704 0.191 22.216);\n  --destructive-foreground: oklch(0.58 0.22 27);\n\n  --border: oklch(1 0 0 / 10%);\n  --input: oklch(1 0 0 / 15%);\n  --ring: oklch(0.556 0 0);\n\n  --surface: oklch(0.2 0 0);\n  --surface-foreground: oklch(0.708 0 0);\n  --selection: oklch(0.922 0 0);\n  --selection-foreground: oklch(0.205 0 0);\n\n  --sidebar: oklch(0.205 0 0);\n  --sidebar-foreground: oklch(0.985 0 0);\n  --sidebar-primary: oklch(0.488 0.243 264.376);\n  --sidebar-primary-foreground: oklch(0.985 0 0);\n  --sidebar-accent: oklch(0.269 0 0);\n  --sidebar-accent-foreground: oklch(0.985 0 0);\n  --sidebar-border: oklch(1 0 0 / 10%);\n  --sidebar-ring: oklch(0.439 0 0);\n}\n\n/* ------------------------------------------------------------------\n   TYPOGRAPHY — font families, sizes, weights, line-heights, tracking.\n   shadcn/ui uses a single sans family (Geist) for body + headings,\n   and Geist Mono for code. Tailwind's default type scale.\n   ------------------------------------------------------------------ */\n\n:root {\n  /* Families */\n  --font-sans: \"Geist\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n  --font-heading: \"Geist\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", monospace;\n\n  /* Font sizes (Tailwind scale) — size / line-height */\n  --text-xs: 0.75rem;    --text-xs--line-height: 1rem;      /* 12 / 16 */\n  --text-sm: 0.875rem;   --text-sm--line-height: 1.25rem;   /* 14 / 20 */\n  --text-base: 1rem;     --text-base--line-height: 1.5rem;  /* 16 / 24 */\n  --text-lg: 1.125rem;   --text-lg--line-height: 1.75rem;   /* 18 / 28 */\n  --text-xl: 1.25rem;    --text-xl--line-height: 1.75rem;   /* 20 / 28 */\n  --text-2xl: 1.5rem;    --text-2xl--line-height: 2rem;     /* 24 / 32 */\n  --text-3xl: 1.875rem;  --text-3xl--line-height: 2.25rem;  /* 30 / 36 */\n  --text-4xl: 2.25rem;   --text-4xl--line-height: 2.5rem;   /* 36 / 40 */\n  --text-5xl: 3rem;      --text-5xl--line-height: 1;         /* 48 */\n  --text-6xl: 3.75rem;   --text-6xl--line-height: 1;         /* 60 */\n\n  /* Weights */\n  --font-weight-normal: 400;\n  --font-weight-medium: 500;\n  --font-weight-semibold: 600;\n  --font-weight-bold: 700;\n\n  /* Letter-spacing */\n  --tracking-tighter: -0.05em;\n  --tracking-tight: -0.025em;\n  --tracking-normal: 0em;\n  --tracking-wide: 0.025em;\n  --tracking-widest: 0.1em;\n\n  /* Line-height keywords */\n  --leading-none: 1;\n  --leading-tight: 1.25;\n  --leading-snug: 1.375;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.625;\n}\n\n/* ------------------------------------------------------------------\n   SPACING — Tailwind's 4px-base spacing scale (--spacing = 0.25rem).\n   Every step is a multiple of the base unit. Used for padding,\n   margin, and gap throughout the system.\n   ------------------------------------------------------------------ */\n\n:root {\n  --spacing: 0.25rem;   /* 4px base unit */\n\n  --space-0: 0;\n  --space-0-5: calc(var(--spacing) * 0.5);  /* 2px  */\n  --space-1: calc(var(--spacing) * 1);      /* 4px  */\n  --space-1-5: calc(var(--spacing) * 1.5);  /* 6px  */\n  --space-2: calc(var(--spacing) * 2);      /* 8px  */\n  --space-2-5: calc(var(--spacing) * 2.5);  /* 10px */\n  --space-3: calc(var(--spacing) * 3);      /* 12px */\n  --space-4: calc(var(--spacing) * 4);      /* 16px */\n  --space-5: calc(var(--spacing) * 5);      /* 20px */\n  --space-6: calc(var(--spacing) * 6);      /* 24px */\n  --space-8: calc(var(--spacing) * 8);      /* 32px */\n  --space-10: calc(var(--spacing) * 10);    /* 40px */\n  --space-12: calc(var(--spacing) * 12);    /* 48px */\n  --space-16: calc(var(--spacing) * 16);    /* 64px */\n  --space-20: calc(var(--spacing) * 20);    /* 80px */\n  --space-24: calc(var(--spacing) * 24);    /* 96px */\n}\n\n/* ------------------------------------------------------------------\n   RADIUS — shadcn/ui derives a scale from a single --radius base.\n   base = 0.625rem (10px). sm/md/lg/xl/2xl scale off it.\n   ------------------------------------------------------------------ */\n\n:root {\n  --radius: 0.625rem;                        /* 10px — the base knob */\n  --radius-sm: calc(var(--radius) * 0.6);    /* 6px  */\n  --radius-md: calc(var(--radius) * 0.8);    /* 8px  */\n  --radius-lg: var(--radius);                /* 10px */\n  --radius-xl: calc(var(--radius) * 1.4);    /* 14px */\n  --radius-2xl: calc(var(--radius) * 1.8);   /* 18px */\n  --radius-3xl: calc(var(--radius) * 2.2);   /* 22px */\n  --radius-full: 9999px;\n}\n\n/* ------------------------------------------------------------------\n   SHADOWS — Tailwind's elevation scale. shadcn leans on the low end:\n   shadow-xs on inputs/buttons, shadow-sm on cards, shadow-md on\n   popovers/dropdowns, shadow-lg/xl/2xl on dialogs & overlays.\n   ------------------------------------------------------------------ */\n\n:root {\n  --shadow-2xs: 0 1px rgb(0 0 0 / 0.05);\n  --shadow-xs:  0 1px 2px 0 rgb(0 0 0 / 0.05);\n  --shadow-sm:  0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);\n  --shadow-md:  0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);\n  --shadow-lg:  0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);\n  --shadow-xl:  0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);\n  --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);\n}\n\n/* ------------------------------------------------------------------\n   BASE — minimal resets + body defaults so specimen cards and kits\n   inherit the brand typeface and color without extra setup.\n   ------------------------------------------------------------------ */\n\nbody {\n  font-family: var(--font-sans);\n  color: var(--foreground);\n  background: var(--background);\n  font-synthesis-weight: none;\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\n\n::selection {\n  background: var(--selection);\n  color: var(--selection-foreground);\n}\n\n/* ==================================================================\n   COMPONENT STYLES — shadcn/ui (new-york-v4), hand-ported to plain CSS\n   driven entirely by the design tokens. Class names are prefixed `ui-`.\n   Values (heights, paddings, radii) are copied verbatim from source.\n   ================================================================== */\n\n/* ---------- BUTTON ---------- */\n.ui-btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  gap: var(--space-2); flex-shrink: 0; white-space: nowrap;\n  border-radius: var(--radius-md); font-family: var(--font-sans);\n  font-size: var(--text-sm); line-height: var(--text-sm--line-height);\n  font-weight: var(--font-weight-medium);\n  transition: all .15s ease; outline: none; cursor: pointer;\n  border: 1px solid transparent; user-select: none;\n  height: 2.25rem; padding: 0 var(--space-4); /* h-9 px-4 */\n}\n.ui-btn > svg { width: 1rem; height: 1rem; flex-shrink: 0; pointer-events: none; }\n.ui-btn:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent); }\n.ui-btn:disabled { pointer-events: none; opacity: .5; }\n.ui-btn:active { opacity: .9; }\n\n.ui-btn[data-variant=\"default\"] { background: var(--primary); color: var(--primary-foreground); }\n.ui-btn[data-variant=\"default\"]:hover { background: color-mix(in oklab, var(--primary) 90%, transparent); }\n.ui-btn[data-variant=\"destructive\"] { background: var(--destructive); color: #fff; }\n.ui-btn[data-variant=\"destructive\"]:hover { background: color-mix(in oklab, var(--destructive) 90%, transparent); }\n.ui-btn[data-variant=\"outline\"] { border-color: var(--border); background: var(--background); box-shadow: var(--shadow-xs); }\n.ui-btn[data-variant=\"outline\"]:hover { background: var(--accent); color: var(--accent-foreground); }\n.ui-btn[data-variant=\"secondary\"] { background: var(--secondary); color: var(--secondary-foreground); }\n.ui-btn[data-variant=\"secondary\"]:hover { background: color-mix(in oklab, var(--secondary) 80%, transparent); }\n.ui-btn[data-variant=\"ghost\"] { background: transparent; }\n.ui-btn[data-variant=\"ghost\"]:hover { background: var(--accent); color: var(--accent-foreground); }\n.ui-btn[data-variant=\"link\"] { background: transparent; color: var(--primary); text-underline-offset: 4px; }\n.ui-btn[data-variant=\"link\"]:hover { text-decoration: underline; }\n\n.ui-btn[data-size=\"xs\"] { height: 1.5rem; padding: 0 var(--space-2); font-size: var(--text-xs); gap: v havior: 'smooth' });\n  }\n\n  // Centra la jornada tocada en el carrusel (7 visibles → centro = idx - 3)\n  centrarJornada(idx) {\n    const el = this._barraEl;\n    if (!el) return;\n    const w = el.scrollWidth / this.JORNADAS.length;\n    const destino = Math.max(0, Math.min(w * (idx - 3), el.scrollWidth - el.clientWidth));\n    el.style.scrollSnapType = 'none';\n    el.scrollTo({ left: destino, behavior: 'smooth' });\n    clearTimeout(this._tCentrar);\n    this._tCentrar = setTimeout(() => { el.style.scrollSnapType = ''; }, 500);\n  }\n\n  iniciarBarraJornadas(el) {\n    if (!el || el._qjInit) return;\n    el._qjInit = true;\n    this._barraEl = el;\n    const flechas = () => {\n      const max = el.scrollWidth - el.clientWidth - 1;\n      [['izq', el.scrollLeft <= 1], ['der', el.scrollLeft >= max]].forEach(([lado, tope]) => {\n        const b = el.parentElement && el.parentElement.querySelector('[data-flecha=\"' + lado + '\"]');\n        if (b) { b.style.opacity = tope ? '0.25' : '1'; b.style.pointerEvents = tope ? 'none' : 'auto'; }\n      });\n    };\n    el.addEventListener('scroll', flechas, { passive: true });\n    setTimeout(flechas, 160);\n    // Centrar al cargar la jornada seleccionada (HOY por defecto); reintenta\n    // hasta que el layout esté listo y se detiene al primer toque del usuario.\n    const centrarHoy = () => {\n      if (el._qjToco || el.scrollWidth <= el.clientWidth) return;\n      const i = this.JORNADAS.findIndex(j => j.n === this.state.numJornada);\n      if (i < 0) return;\n      const w = el.scrollWidth / this.JORNADAS.length;\n      el.scrollLeft = Math.max(0, Math.min(w * (i - 3), el.scrollWidth - el.clientWidth));\n    };\n    requestAnimationFrame(centrarHoy);\n    setTimeout(centrarHoy, 150);\n    setTimeout(centrarHoy, 500);\n    const marcarToco = () => { el._qjToco = true; };\n    el.addEventListener('pointerdown', marcarToco, { once: true });\n    el.addEventListener('wheel', marcarToco, { once: true });\n    try { const
