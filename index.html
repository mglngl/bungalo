document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e1cb7e62-1a60-4c84-bd56-4df0e40c2ded\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"dbfe1da7-ecf2-4f2f-8f26-3e64dd56d3d8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#0A0E14; }\n  * { box-sizing:border-box; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#0A0E14;color:#FFFFFF;font-family:'Barlow',system-ui,sans-serif;min-height:100vh;padding:0 0 80px;width:100%;display:flex;justify-content:center;\">\n  <div style=\"width:100%;max-width:1180px;padding:0 28px;\">\n\n    <!-- ===== TOP RIBBON ===== -->\n    <div style=\"display:flex;height:6px;margin:0 -28px 0;\">\n      <span style=\"flex:1;background:#E2192B;\"><\u002Fspan>\n      <span style=\"flex:1;background:#F5C518;\"><\u002Fspan>\n      <span style=\"flex:1;background:#2ECC71;\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ===== HERO ===== -->\n    <header style=\"padding:64px 0 56px;border-bottom:1px solid #1C2430;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#8A94A6;margin-bottom:24px;\">CLAUDE.MD · Contexto del proyecto · Web App<\u002Fdiv>\n      <h1 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:96px;line-height:0.92;letter-spacing:1px;margin:0;text-transform:uppercase;\">\n        Quiniela<br><span style=\"color:#8A94A6;\">Liga de Fútbol<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font-size:21px;line-height:1.5;color:#C9D1DC;max-width:760px;margin:28px 0 0;text-wrap:pretty;\">\n        Una <strong style=\"color:#fff;\">web app móvil<\u002Fstrong> para <strong style=\"color:#F5C518;\">administrar el juego de quiniela<\u002Fstrong> de una liga: los participantes pronostican los resultados de cada jornada, el sistema cierra en la fecha límite, calcula puntos contra los resultados oficiales y mantiene la tabla de posiciones.\n      <\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:32px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1DC;background:#0F1A24;border:1px solid #1C2430;border-radius:4px;padding:8px 14px;\">Mobile-first · ~390px<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1DC;background:#0F1A24;border:1px solid #1C2430;border-radius:4px;padding:8px 14px;\">Frontend 100% estático<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1DC;background:#0F1A24;border:1px solid #1C2430;border-radius:4px;padding:8px 14px;\">GitHub Pages + Google Sheets<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1DC;background:#0F1A24;border:1px solid #1C2430;border-radius:4px;padding:8px 14px;\">Código 100% en español<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1DC;background:#0F1A24;border:1px solid #1C2430;border-radius:4px;padding:8px 14px;\">Roles: jugador · admin<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ===== 01 · EL FLUJO CENTRAL ===== -->\n    <section style=\"padding:64px 0 0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n        <span style=\"width:11px;height:11px;background:#E2192B;border-radius:2px;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;\">01 · El ciclo del juego<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;margin:0 0 28px;text-transform:uppercase;letter-spacing:0.5px;line-height:1;\">Pronosticar → Calificar → Rankear<\u002Fh2>\n\n      <div style=\"display:flex;align-items:stretch;gap:10px;\">\n        <div style=\"flex:1 1 0;min-width:0;background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #E2192B;border-radius:8px;padding:22px 18px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#E2192B;letter-spacing:1px;\">PASO 01<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin-top:10px;line-height:1.05;\">Pronosticar<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">El jugador captura su marcador (1-X-2 y/o exacto) para los partidos de la jornada abierta.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:#5A6473;font-size:22px;font-family:'Barlow Condensed';\">→<\u002Fdiv>\n        <div style=\"flex:1 1 0;min-width:0;background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #E2192B;border-radius:8px;padding:22px 18px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#E2192B;letter-spacing:1px;\">PASO 02<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin-top:10px;line-height:1.05;\">Cierre por límite<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">Al llegar la <strong style=\"color:#C9D1DC;\">fecha límite<\u002Fstrong> el pronóstico se bloquea: ya no puede editarse.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:#5A6473;font-size:22px;font-family:'Barlow Condensed';\">→<\u002Fdiv>\n        <div style=\"flex:1 1 0;min-width:0;background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #8A94A6;border-radius:8px;padding:22px 18px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#8A94A6;letter-spacing:1px;\">PASO 03<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin-top:10px;line-height:1.05;\">Resultados oficiales<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">Los marcadores reales llegan <strong style=\"color:#C9D1DC;\">desde un API externo<\u002Fstrong> de resultados en vivo, no a mano.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:#5A6473;font-size:22px;font-family:'Barlow Condensed';\">→<\u002Fdiv>\n        <div style=\"flex:1 1 0;min-width:0;background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #2ECC71;border-radius:8px;padding:22px 18px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#2ECC71;letter-spacing:1px;\">PASO 04<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin-top:10px;line-height:1.05;\">Cálculo de puntos<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">Server-side, según el reglamento: acierto exacto vs. signo correcto vs. diferencia.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;color:#5A6473;font-size:22px;font-family:'Barlow Condensed';\">→<\u002Fdiv>\n        <div style=\"flex:1 1 0;min-width:0;background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #F5C518;border-radius:8px;padding:22px 18px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#F5C518;letter-spacing:1px;\">PASO 05<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin-top:10px;line-height:1.05;\">Tabla de posiciones<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">El ranking de participantes se recalcula por jornada y general.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 02 · ARQUITECTURA ===== -->\n    <section style=\"padding:64px 0 0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n        <span style=\"width:11px;height:11px;background:#F5C518;border-radius:2px;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;\">02 · Arquitectura<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.5px;line-height:1;\">El servidor es la única verdad<\u002Fh2>\n      <p style=\"font-size:16px;color:#8A94A6;margin:0 0 28px;max-width:720px;\">El frontend es público y no confiable. Toda autorización, validación de fecha límite y cálculo de puntos vive del lado del servidor.<\u002Fp>\n\n      <div style=\"display:flex;align-items:stretch;gap:14px;\">\n        <div style=\"flex:1 1 0;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:24px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8A94A6;letter-spacing:1px;text-transform:uppercase;\">Cliente · público<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;text-transform:uppercase;margin-top:8px;line-height:1;\">GitHub Pages<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.5;margin:14px 0 16px;\">Build estático con React + Vite (o JS puro). Solo conoce el <em>ID de Cliente<\u002Fem> público de Google.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:7px 10px;\">Render de UI + estados<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:7px 10px;\">Nunca es fuente de verdad<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;color:#5A6473;font-size:24px;\">↔<\u002Fdiv>\n\n        <div style=\"flex:1.15 1 0;background:#160d10;border:1px solid #E2192B;border-radius:8px;padding:24px;box-shadow:0 0 0 1px rgba(226,25,43,0.25);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#E2192B;letter-spacing:1px;text-transform:uppercase;\">Frontera de seguridad<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;text-transform:uppercase;margin-top:8px;line-height:1;\">Google Apps Script<\u002Fdiv>\n          <p style=\"font-size:14px;color:#C9D1DC;line-height:1.5;margin:14px 0 16px;\">Web App (endpoint REST) que valida el <strong style=\"color:#fff;\">id_token<\u002Fstrong>, el rol y la fecha límite, y calcula los puntos.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#fff;background:#21090d;border:1px solid #4a1a1f;border-radius:4px;padding:7px 10px;\">enviarPronostico() · valida límite<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#fff;background:#21090d;border:1px solid #4a1a1f;border-radius:4px;padding:7px 10px;\">calificarJornada() · puntos<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#fff;background:#21090d;border:1px solid #4a1a1f;border-radius:4px;padding:7px 10px;\">Secretos solo aquí<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;color:#5A6473;font-size:24px;\">↔<\u002Fdiv>\n\n        <div style=\"flex:1 1 0;display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"flex:1;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:24px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#2ECC71;letter-spacing:1px;text-transform:uppercase;\">Base de datos<\u002Fdiv>\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;margin-top:8px;line-height:1;\">Google Sheets<\u002Fdiv>\n            <p style=\"font-size:13px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">11 pestañas como esquema de datos.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:24px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#F5C518;letter-spacing:1px;text-transform:uppercase;\">Externo<\u002Fdiv>\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;margin-top:8px;line-height:1;\">API resultados<\u002Fdiv>\n            <p style=\"font-size:13px;color:#8A94A6;line-height:1.45;margin:10px 0 0;\">Marcadores en vivo, pasados y futuros. Clave solo en el servidor.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 03 · LA PANTALLA + STACK (two columns) ===== -->\n    <section style=\"padding:64px 0 0;display:flex;gap:36px;align-items:flex-start;\">\n\n      <!-- left: phone mock + components -->\n      <div style=\"flex:1.25 1 0;min-width:0;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n          <span style=\"width:11px;height:11px;background:#2ECC71;border-radius:2px;display:block;\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;\">03 · La pantalla \"Jugar\"<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;margin:0 0 28px;text-transform:uppercase;letter-spacing:0.5px;line-height:1;\">Una columna, de arriba a abajo<\u002Fh2>\n\n        <div style=\"display:flex;gap:28px;align-items:flex-start;\">\n          <!-- phone -->\n          <div style=\"flex:none;width:248px;background:#05080c;border:8px solid #161d27;border-radius:32px;padding:0;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,0.5);\">\n            <div style=\"background:#0A0E14;\">\n              <!-- encabezado -->\n              <div style=\"height:46px;background:#0F1A24;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid #1C2430;\">\n                <div style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:14px;height:14px;border-radius:50%;background:#E2192B;display:block;\"><\u002Fspan><span style=\"font-family:'Barlow Condensed';font-weight:700;font-size:13px;\">MI QUINIELA ▾<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:7px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#E2192B;display:block;\"><\u002Fspan><span style=\"width:9px;height:9px;border:1.5px solid #8A94A6;border-radius:50%;display:block;\"><\u002Fspan><span style=\"width:9px;height:9px;border:1.5px solid #8A94A6;border-radius:2px;display:block;\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <!-- barra jornadas -->\n              <div style=\"height:40 \u002Fdiv><div style=\"font-size:12.5px;color:#8A94A6;margin-top:6px;line-height:1.4;\">actor · acción · entidad (sin PII)<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#0D1219;border:1px dashed #2a3340;border-radius:8px;padding:16px;display:flex;align-items:center;\"><div style=\"font-size:12.5px;color:#5A6473;line-height:1.4;\">Cálculo de puntos y Posiciones se derivan <strong style=\"color:#8A94A6;\">server-side<\u002Fstrong>.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 06 · SEGURIDAD ===== -->\n    <section style=\"padding:64px 0 0;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n        <span style=\"width:11px;height:11px;background:#E2192B;border-radius:2px;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;\">06 · Seguridad · OWASP Top 10 + integridad del juego<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;margin:0 0 28px;text-transform:uppercase;letter-spacing:0.5px;line-height:1;\">Anti-trampa primero<\u002Fh2>\n\n      <div style=\"display:flex;gap:14px;align-items:stretch;margin-bottom:14px;\">\n        <div style=\"flex:1;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:20px;\">\n          <div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:19px;text-transform:uppercase;color:#fff;\">Límite server-side<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#8A94A6;line-height:1.45;margin:9px 0 0;\">Rechaza pronósticos tras la <strong style=\"color:#C9D1DC;\">fecha límite<\u002Fstrong> usando la hora del servidor, nunca la del cliente.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:1;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:20px;\">\n          <div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:19px;text-transform:uppercase;color:#fff;\">Inmutable tras cierre<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#8A94A6;line-height:1.45;margin:9px 0 0;\">Una vez bloqueado o calificado, el pronóstico no se edita ni por su dueño.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:1;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:20px;\">\n          <div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:19px;text-transform:uppercase;color:#fff;\">Sin copiar<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#8A94A6;line-height:1.45;margin:9px 0 0;\">Los pronósticos ajenos no se revelan mientras la jornada esté abierta.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:1;background:#0F1A24;border:1px solid #1C2430;border-radius:8px;padding:20px;\">\n          <div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:19px;text-transform:uppercase;color:#fff;\">Puntos del servidor<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#8A94A6;line-height:1.45;margin:9px 0 0;\">Resultados y cálculo solo server-side; nunca aceptados desde el cliente.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:8px;\">\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A01 Acceso<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A02 Cripto<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A03 Inyección<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A04 Diseño<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A05 Config<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A06 Componentes<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A07 Auth<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A08 Integridad<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A09 Logging<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono';font-size:12px;color:#C9D1DC;background:#0D1219;border:1px solid #1C2430;border-radius:4px;padding:9px 11px;\">A10 SSRF<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 07 · ROLES + ROADMAP ===== -->\n    <section style=\"padding:64px 0 0;display:flex;gap:36px;align-items:flex-start;\">\n      <div style=\"flex:0.7 1 0;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n          <span style=\"width:11px;height:11px;background:#2ECC71;border-radius:2px;display:block;\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;\">07 · Roles<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;margin:0 0 24px;text-transform:uppercase;letter-spacing:0.5px;line-height:1;\">Quién hace qué<\u002Fh2>\n        <div style=\"background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #2ECC71;border-radius:8px;padding:20px;margin-bottom:14px;\">\n          <div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:24px;text-transform:uppercase;\">Jugador<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.5;margin:8px 0 0;\">Juega y consulta: captura pronósticos, ve su posición, puntos y pendientes. Solo lee/escribe sus propios datos.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#0F1A24;border:1px solid #1C2430;border-top:3px solid #E2192B;border-radius:8px;padding:20px;\">\n          <div style=\"font-family:'Barlow Condensed';font-weight:700;font-size:24px;text-transform:uppercase;\">Admin<\u002Fdiv>\n          <p style=\"font-size:14px;color:#8A94A6;line-height:1.5;margin:8px 0 0;\">Crea jornadas y partidos, gestiona reglamento, participantes y avisos. Verificado server-side; denegar por defecto.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1 1 0;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">\n          <span style=\"width:11px;height:11px;background:#F5C518;border-radius:2px;display:block;\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;\">08 · Orden de implementación<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;margin:0 0 24px;text-transform:uppercase;letter-spacing:0.5px;line-height:1;\">La hoja de ruta<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">01<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Scaffolding: Vite + tokens + layout fijo<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">02<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Pantalla \"Jugar\" con datos de prueba<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">03<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Apps Script + Sheets + controles de seguridad<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">04<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Integración con API de resultados<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">05<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Auth Google + correo + OTP + roles<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">06<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Envío con bloqueo + lectura de ranking<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">07<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Calificación automática + panel admin<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:baseline;background:#0D1219;border:1px solid #1C2430;border-radius:6px;padding:13px 14px;\"><span style=\"font-family:'JetBrains Mono';font-size:15px;color:#F5C518;flex:none;\">08<\u002Fspan><span style=\"font-size:14px;color:#C9D1DC;line-height:1.35;\">Publicidad + CI/CD + estados + responsive<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== FOOTER / DEFINICIÓN DE HECHO ===== -->\n    <section style=\"padding:56px 0 0;\">\n      <div style=\"background:#0F1A24;border:1px solid #1C2430;border-radius:10px;padding:36px 40px;\">\n        <div style=\"display:flex;height:5px;width:90px;margin-bottom:22px;border-radius:3px;overflow:hidden;\">\n          <span style=\"flex:1;background:#E2192B;\"><\u002Fspan><span style=\"flex:1;background:#F5C518;\"><\u002Fspan><span style=\"flex:1;background:#2ECC71;\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono';font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#8A94A6;margin-bottom:14px;\">Definición de \"hecho\"<\u002Fdiv>\n        <p style=\"font-size:20px;line-height:1.55;color:#E6EBF1;margin:0;max-width:920px;text-wrap:pretty;\">\n          La app <strong style=\"color:#fff;\">administra la quiniela<\u002Fstrong>: el jugador autenticado captura pronósticos que se <strong style=\"color:#E2192B;\">bloquean en la fecha límite<\u002Fstrong>, los resultados se <strong style=\"color:#F5C518;\">sincronizan desde el API deportivo<\u002Fstrong> y disparan el <strong style=\"color:#2ECC71;\">cálculo de puntos<\u002Fstrong>, el ranking se actualiza, y todo pasa el checklist de seguridad OWASP — desplegado en GitHub Pages bajo HTTPS.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"text-align:center;font-family:'JetBrains Mono';font-size:11px;color:#5A6473;letter-spacing:1px;margin-top:28px;\">QUINIELA · LIGA DE FÚTBOL · MOBILE-FIRST · ESTÁTICO · ESPAÑOL<\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
